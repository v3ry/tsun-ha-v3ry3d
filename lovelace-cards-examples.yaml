        type: attribute
        attribute: station_scene
        name: Scène station
      - entity: sensor.{station}_raw_data
        type: attribute
        attribute: station_alerts
        name: Alertes

  - type: entities
    title: "🔄 Flux courant"
    entities:
      - entity: sensor.{station}_day_graph
        type: attribute
        attribute: current_flow
        name: Flux énergétique courant

  - type: custom:apexcharts-card
    header:
      show: true
      title: "📈 Courbes journée"
      show_states: false
    graph_span: 24h
    span:
      start: day
    apex_config:
      chart:
        height: 320
      yaxis:
        - id: power
          title:
            text: "W"
        - id: temp
          opposite: true
          title:
            text: "°C"
    series:
      - entity: sensor.{station}_day_graph
        name: Consommation
        yaxis_id: power
        type: line
        color: "#1e88e5"
        stroke_width: 2
        data_generator: |
          const points = entity?.attributes?.power_points || [];
          return points
            .filter((p) => p.dateTime != null && p.usePower != null)
            .map((p) => [p.dateTime * 1000, p.usePower]);
      - entity: sensor.{station}_day_graph
        name: Batterie
        yaxis_id: power
        type: line
        color: "#43a047"
        stroke_width: 2
        data_generator: |
          const points = entity?.attributes?.power_points || [];
          return points
            .filter((p) => p.dateTime != null && p.batteryPower != null)
            .map((p) => [p.dateTime * 1000, p.batteryPower]);
      - entity: sensor.{station}_day_graph
        name: Achat réseau
        yaxis_id: power
        type: line
        color: "#fb8c00"
        stroke_width: 2
        data_generator: |
          const points = entity?.attributes?.power_points || [];
          return points
            .filter((p) => p.dateTime != null && p.buyPower != null)
            .map((p) => [p.dateTime * 1000, p.buyPower]);
      - entity: sensor.{station}_day_graph
        name: Température
        yaxis_id: temp
        type: area
        color: "#8e24aa"
        opacity: 0.2
        stroke_width: 1
        data_generator: |
          const points = entity?.attributes?.weather_points || [];
          return points
            .filter((p) => p.datetime != null && p.temp != null)
            .map((p) => [p.datetime * 1000, p.temp]);
